jdk:
  - openjdk21

before_install:
  - chmod +x gradlew
  - java -version
  - ./gradlew -v

install:
  - export JAVA_HOME=$(readlink -f $(which java) | sed "s:/bin/java::")
  - ./gradlew build :bom:publishToMavenLocal :theme:publishToMavenLocal -x :theme:lintAnalyzeDebug -x test -x androidTest --no-daemon --stacktrace --info
