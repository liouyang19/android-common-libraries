jdk:
  - openjdk21

before_install:
  - export JAVA_HOME=$(dirname $(dirname $(readlink -f $(which java))))
  - export PATH=$JAVA_HOME/bin:$PATH
  - echo "JAVA_HOME=$JAVA_HOME"
  - java -version
  - chmod +x gradlew

install:
  - ./gradlew publishToMavenLocal -x :theme:lintAnalyzeDebug -x test --no-daemon --stacktrace